services:
  # ===========================================
  # Caddy - Reverse Proxy with SSL
  # ===========================================
  caddy:
    image: caddy:2-alpine
    container_name: vera-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    restart: unless-stopped
    networks:
      - vera-network
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # Decomposer - Standard (No CoT)
  # ===========================================
  decomposer:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: vera-decomposer
    volumes:
      - ./models/decomposer:/models:ro
    command: >
      -m /models/${DECOMPOSER_MODEL:-LFM2.5-1.2B-Instruct.F16.gguf}
      --host 0.0.0.0
      --port 8080
      -t 4
      -c 2048
    restart: unless-stopped
    networks:
      - vera-network
    deploy:
      resources:
        limits:
          memory: 8G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================
  # Decomposer - CoT (Chain-of-Thought)
  # ===========================================
  decomposer-cot:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: vera-decomposer-cot
    volumes:
      - ./models/decomposer-cot:/models:ro
    command: >
      -m /models/${DECOMPOSER_COT_MODEL:-LFM2.5-1.2B-Instruct.F16.gguf}
      --host 0.0.0.0
      --port 8080
      -t 4
      -c 2048
    restart: unless-stopped
    networks:
      - vera-network
    deploy:
      resources:
        limits:
          memory: 8G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================
  # Verifier - ModernBERT Zeroshot (Standard Mode)
  # ===========================================
  verifier:
    build:
      context: ./verifier
      dockerfile: Dockerfile
    container_name: vera-verifier
    volumes:
      - ./models/verifier:/app/models
    environment:
      - MODEL_ID=MoritzLaurer/ModernBERT-large-zeroshot-v2.0
      - PORT=8081
    restart: unless-stopped
    networks:
      - vera-network
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ===========================================
  # Verifier - CoT (LLM-based with reasoning)
  # ===========================================
  verifier-cot:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: vera-verifier-cot
    volumes:
      - ./models/verifier-cot:/models:ro
    command: >
      -m /models/${VERIFIER_COT_MODEL:-LFM2.5-1.2B-Instruct.F16.gguf}
      --host 0.0.0.0
      --port 8080
      -t 4
      -c 2048
    restart: unless-stopped
    networks:
      - vera-network
    deploy:
      resources:
        limits:
          memory: 8G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================
  # API - FastAPI Orchestrator
  # ===========================================
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: vera-api
    environment:
      # Standard mode endpoints
      - DECOMPOSER_URL=http://decomposer:8080
      - VERIFIER_URL=http://verifier:8081
      # CoT mode endpoints
      - DECOMPOSER_COT_URL=http://decomposer-cot:8080
      - VERIFIER_COT_URL=http://verifier-cot:8080
      # API Keys
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    depends_on:
      - decomposer
      - decomposer-cot
      - verifier
      - verifier-cot
    restart: unless-stopped
    networks:
      - vera-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # Frontend - Streamlit UI
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vera-frontend
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - vera-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  vera-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
